services:
  frontend:
    build: ./frontend
    image: student-frontend:v1.0.0
    container_name: student_frontend_app
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    image: student-backend:v1.0.0
    container_name: student_backend_api
    ports:
      - "5000:5000"
    depends_on:
      - database

  database:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver_db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword123!"
    ports:
      - "1433:1433"
    restart: always